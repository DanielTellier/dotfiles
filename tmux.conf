# Heavly referenced this config:
# https://gist.github.com/spicycode/1229612

unbind r
bind r source-file ~/.tmux.conf

# 0 is too far from ` ;)
set -g base-index 1

set -g default-terminal "screen-256color"
set -g set-clipboard on
set -g history-limit 10000
set -g mouse on

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g status-position top

setw -g mode-keys vi
set -g status-keys vi

# Do not ask for confirmation when killing a pane or window
bind-key x kill-pane
bind-key & kill-window

# No delay for escape key press
set -sg escape-time 0

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'odedlaz/tmux-onedark-theme'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# Run this to create this folder:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
run '~/.tmux/plugins/tpm/tpm'

# ==============================================
# OVERRIDES (Must be BELOW the run command)
# ==============================================
# Main Bar Background: Dark Grey
set -g status-style bg='#282c34',fg='#abb2bf'

# LEFT SIDE: Title "tmux"
set -g status-left "#[fg=#abb2bf,bg=#3e4452] tmux "
set -g status-left-length 20

# CENTER: Window List
# This moves the window list (1:zsh 2:vim) to the middle
set -g status-justify centre

# Right Side: Session Name
# Background: Visual Grey (#3e4452) | Foreground: Text Grey (#abb2bf)
set -g status-right "#[fg=#abb2bf,bg=#3e4452] #S "

# Active Window: Use the same Visual Grey background as the Session Name
set-window-option -g window-status-current-style bg='#3e4452',fg='#abb2bf'
set-window-option -g window-status-current-format " #I:#W "
# Inactive Windows: Blend into the main dark background
set-window-option -g window-status-style bg='#282c34',fg='#abb2bf'
set-window-option -g window-status-format " #I:#W "

# ---------------------------------------------------------
# AI Agent Pane Output Monitoring
# ---------------------------------------------------------

# Turn off pane borders (reverting the previous setup)
set -g pane-border-status off

# Format inactive windows: 
# 1. Turn green if silent, otherwise default
# 2. Show *name* if monitoring is ON, otherwise show normal name
set-window-option -g window-status-format "#{?window_silence_flag,#[bg=green fg=black],#[default]} #I:#{?@agent_monitor,*#W*,#W} "

# Format the active window: 
# 1. Turn green if silent, otherwise use a grey highlight
# 2. Show *name* if monitoring is ON, otherwise show normal name
set-window-option -g window-status-current-format "#{?window_silence_flag,#[bg=green fg=black],#[bg=colour236 fg=white]} #I:#{?@agent_monitor,*#W*,#W} "

# Create a shortcut (Prefix + Shift + A) to toggle Agent Monitoring ON/OFF
bind A if-shell -F '#{@agent_monitor}' \
  'set-window-option monitor-silence 0 ; set-window-option @agent_monitor 0 ; display-message -d 500 "Agent monitoring OFF"' \
  'set-window-option monitor-silence 3 ; set-window-option @agent_monitor 1 ; display-message -d 500 "Agent monitoring ON: Waiting for 3s of silence..."'
