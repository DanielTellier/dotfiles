# Heavly referenced this config:
# https://gist.github.com/spicycode/1229612

unbind r
bind r source-file ~/.tmux.conf

# 0 is too far from ` ;)
set -g base-index 1

set -g default-terminal "screen-256color"
set -g set-clipboard on
set -g history-limit 10000
set -g mouse on
set -g focus-events on

# Automatically set window title
set-option -g set-titles on
set-option -g status-position top

setw -g mode-keys vi
set -g status-keys vi

# Do not ask for confirmation when killing a pane or window
bind-key x kill-pane
bind-key & kill-window

# Clear the original name of the window when renaming it
bind-key , command-prompt "rename-window '%%'"

# No delay for escape key press
set -sg escape-time 0

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'odedlaz/tmux-onedark-theme'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# Run this to create this folder:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
run '~/.tmux/plugins/tpm/tpm'

# tmux-open
set -g @open-S 'https://www.google.com/search?q='

# ==============================================
# OVERRIDES (Must be BELOW the run command)
# ==============================================
# Main Bar Background: Dark Grey
set -g status-style bg='#282c34',fg='#abb2bf'

# LEFT SIDE: Title "tmux"
set -g status-left "#[fg=#abb2bf,bg=#3e4452] tmux "
set -g status-left-length 20

# CENTER: Window List
# This moves the window list (1:zsh 2:vim) to the middle
set -g status-justify centre

# Right Side: Session Name
# Background: Visual Grey (#3e4452) | Foreground: Text Grey (#abb2bf)
set -g status-right "#[fg=#abb2bf,bg=#3e4452] #S "

# ---------------------------------------------------------
# Window Status with Output Monitoring
# ---------------------------------------------------------

# Window status — style and format
# Inactive: subtle | Active: highlighted | Silence detected: green
set -wg window-status-style bg='#282c34',fg='#abb2bf'
set -wg window-status-current-style bg='#3e4452',fg='#abb2bf'
set -wg window-status-format " #I:#W "
set -wg window-status-current-format " #I:#W "

# Prefix + Shift+A — toggle agent silence monitoring on/off
bind A if -F '#{@agent_monitor}' \
  'set -w monitor-silence 0 ; \
   set -w window-status-format "#{?window_silence_flag,#[noreverse]#[bg=white]#[fg=black],#[default]} #I:#W " ; \
   set -w window-status-current-format "#{?window_silence_flag,#[noreverse]#[bg=white]#[fg=black],#[default]} #I:#W " ; \
   set -w @agent_monitor 0 ; \
   display "Agent OFF"' \
  'set -w monitor-silence 3 ; \
   set -w window-status-format         "#{?window_silence_flag,#[noreverse]#[bg=green]#[fg=black],#[default]} #I:*#W* " ; \
   set -w window-status-current-format "#{?window_silence_flag,#[noreverse]#[bg=green]#[fg=black],#[default]} #I:*#W* " ; \
   set -w @agent_monitor 1 ; \
   display "Agent ON"'
